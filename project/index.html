<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGO — 함께 만드는 변화</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    scroll-snap-type: y mandatory;
  }

  html, body {
    width: 100%;
    min-height: 100%;
    background: #fff;
    color: #000;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ─────────────────────────────────────── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 50px;
    background: #fff;
    z-index: 100;
  }

  .logo {
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -.01em;
    color: #000;
    text-decoration: none;
  }

  .menu-btn {
    width: 40px;
    height: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
  }
  .menu-btn span {
    display: block;
    width: 24px;
    height: 2px;
    background: #000;
    transition: all .3s ease;
  }
  .menu-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .menu-btn.open span:nth-child(2) { opacity: 0; }
  .menu-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* ── HERO ────────────────────────────────────────── */
  .hero {
    scroll-snap-align: start;
    height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 50px;
    overflow: hidden;
  }

  .hero-text {
    position: relative;
    z-index: 2;
    flex-shrink: 0;
    margin-top: 90px;
  }

  .hero-text h1 {
    font-size: 66px;
    font-weight: 600;
    line-height: 1.1;
    color: #000;
    letter-spacing: -.02em;
    cursor: default;
  }

  .hero-text h1 .word {
    display: inline-block;
  }
  .hero-text h1 .char {
    display: inline-block;
    will-change: transform;
  }

  /* ── HERO STRIP ──────────────────────────────────── */
  .hero-strip-wrap {
    position: absolute;
    left: 833px;
    top: 50%;
    transform: translateY(-50%);
    margin-top: 45px;
    z-index: 3;
    cursor: default;
  }

  .hero-strip {
    display: flex;
    gap: 0;
    width: max-content;
  }

  .strip-img {
    width: 400px;
    height: 500px;
    flex-shrink: 0;
    overflow: hidden;
    background: #d9d9d9;
  }

  .strip-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── IC ARROW ────────────────────────────────────── */
  .ic-arrow {
    position: absolute;
    right: 50px;
    top: 50%;
    transform: translateY(-50%);
    margin-top: 45px;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: #000;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    padding: 0;
    transition: opacity .2s;
  }
  .ic-arrow:hover { opacity: .7; }

  /* ── PAGE CURTAIN ────────────────────────────────── */
  .page-curtain {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 10000;
    transform: scaleX(0);
    transform-origin: left center;
    pointer-events: none;
  }

  /* ── FULL-SCREEN NAV OVERLAY ──────────────────────── */
  .nav-overlay {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 600px;
    background: #000;
    z-index: 500;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 50px;
    transform: translateX(100%);
    pointer-events: none;
    transition: transform .45s cubic-bezier(.77,0,.18,1);
  }
  .nav-overlay.open {
    transform: translateX(0);
    pointer-events: all;
  }
  .nav-overlay nav {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .nav-overlay nav a {
    font-size: 40px;
    font-weight: 600;
    color: #fff;
    text-decoration: none;
    letter-spacing: -.02em;
    line-height: 1.1;
    transition: opacity .2s;
  }
  .nav-overlay nav a:hover { opacity: .4; }

  .nav-close {
    position: absolute;
    top: 25px;
    right: 50px;
    width: 40px;
    height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
  }
  .nav-close span {
    display: block;
    width: 24px;
    height: 2px;
    background: #fff;
    position: absolute;
  }
  .nav-close span:nth-child(1) { transform: rotate(45deg); }
  .nav-close span:nth-child(2) { transform: rotate(-45deg); }

  .nav-footer {
    position: absolute;
    bottom: 40px;
    left: 50px;
    font-size: 14px;
    color: rgba(255,255,255,.45);
    letter-spacing: .01em;
  }

  /* ── SECTION 2 ──────────────────────────────────── */
  .section2 {
    scroll-snap-align: start;
    height: 100vh;
    background: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 50px;
    gap: 51px;
  }

  .s2-heading {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .s2-sub {
    font-size: 40px;
    font-weight: 600;
    color: #000;
    line-height: 1.1;
    letter-spacing: -.02em;
  }

  .s2-title {
    font-size: 100px;
    font-weight: 600;
    color: #000;
    line-height: 1;
    letter-spacing: -.03em;
  }

  .s2-services {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .s2-row {
    display: flex;
    align-items: center;
    gap: 30px;
    flex-wrap: nowrap;
  }

  .s2-row span {
    font-size: 64px;
    font-weight: 600;
    color: #c8c8c8;
    line-height: 1.1;
    letter-spacing: -.02em;
    white-space: nowrap;
    transition: color 0.3s ease;
    cursor: default;
  }
  .s2-row span:hover { color: #000; }

  /* ── SERVICE PREVIEW IMAGE ── */
  .service-preview {
    position: fixed;
    top: 0; left: 0;
    width: 200px;
    height: 200px;
    margin-left: 16px;
    margin-top: 16px;
    pointer-events: none;
    z-index: 400;
    opacity: 0;
    overflow: hidden;
  }
  .service-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
</style>
</head>
<body>

<!-- SERVICE PREVIEW -->
<div class="service-preview" id="servicePreview">
  <img id="servicePreviewImg" src="" alt="">
</div>

<!-- PAGE CURTAIN -->
<div class="page-curtain" id="pageCurtain"></div>

<!-- NAV OVERLAY -->
<div class="nav-overlay" id="navOverlay">
  <button class="nav-close" id="navClose" aria-label="메뉴 닫기">
    <span></span>
    <span></span>
  </button>
  <nav>
    <a href="#">Work</a>
    <a href="#">Services</a>
    <a href="#">Process</a>
    <a href="#">Contact</a>
  </nav>
  <div class="nav-footer">hello@axon.studio &nbsp;·&nbsp; Seoul, Korea</div>
</div>

<!-- HEADER -->
<header>
  <a class="logo" href="#">LOGO</a>
  <button class="menu-btn" id="menuBtn" aria-label="메뉴 열기">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1><span class="word">We</span> <span class="word">are</span> <span class="word">creators</span><br><span class="word">for</span> <span class="word">movement</span></h1>
  </div>

  <div class="hero-strip-wrap" id="heroStripWrap">
    <div class="hero-strip" id="heroStrip">
      <div class="strip-img"><img src="https://www.figma.com/api/mcp/asset/636bea3e-eea7-4aca-ab61-1537e23bf9ff" alt=""></div>
      <div class="strip-img"><img src="https://www.figma.com/api/mcp/asset/093e414f-59cc-4d3e-a8f0-923a97cc7c5d" alt=""></div>
      <div class="strip-img"><img src="https://www.figma.com/api/mcp/asset/f7078120-a5b6-4bed-812e-ac02fb8b90fd" alt=""></div>
      <div class="strip-img"><img src="https://www.figma.com/api/mcp/asset/9a88f11e-24a8-474e-9a93-7aa35be2dcbf" alt=""></div>
      <!-- duplicates for seamless loop -->
      <div class="strip-img"><img src="https://www.figma.com/api/mcp/asset/636bea3e-eea7-4aca-ab61-1537e23bf9ff" alt=""></div>
      <div class="strip-img"><img src="https://www.figma.com/api/mcp/asset/093e414f-59cc-4d3e-a8f0-923a97cc7c5d" alt=""></div>
      <div class="strip-img"><img src="https://www.figma.com/api/mcp/asset/f7078120-a5b6-4bed-812e-ac02fb8b90fd" alt=""></div>
      <div class="strip-img"><img src="https://www.figma.com/api/mcp/asset/9a88f11e-24a8-474e-9a93-7aa35be2dcbf" alt=""></div>
    </div>
  </div>

  <button class="ic-arrow" id="icArrow" aria-label="Work 보기">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <path d="M10 5l9 9-9 9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</section>

<!-- SECTION 2 -->
<section class="section2">
  <div class="s2-heading">
    <p class="s2-sub">아워스튜디오의 하는일 살펴보기</p>
    <p class="s2-title">Our Studio</p>
  </div>
  <div class="s2-services">
    <div class="s2-row">
      <span>Website&amp;Platform Design</span>
      <span>UIUX Design</span>
    </div>
    <div class="s2-row">
      <span>Design System</span>
      <span>Service Planning</span>
      <span>Marketing</span>
    </div>
  </div>
</section>

<script>
  gsap.registerPlugin(ScrollTrigger);

  /* ── NAV ── */
  const btn = document.getElementById('menuBtn');
  const overlay = document.getElementById('navOverlay');
  const closeBtn = document.getElementById('navClose');

  function toggleMenu(force) {
    const isOpen = force !== undefined ? force : !overlay.classList.contains('open');
    overlay.classList.toggle('open', isOpen);
    btn.classList.toggle('open', isOpen);
  }

  btn.addEventListener('click', () => toggleMenu());
  closeBtn.addEventListener('click', () => toggleMenu(false));

  /* ── HERO TEXT SCATTER → ASSEMBLE (char by char) ── */
  document.querySelectorAll('.hero-text .word').forEach(word => {
    word.innerHTML = word.textContent.split('').map(c => `<span class="char">${c}</span>`).join('');
  });
  const heroChars = document.querySelectorAll('.hero-text .char');

  gsap.from(heroChars, {
    x: () => gsap.utils.random(-window.innerWidth * 0.5, window.innerWidth * 0.5),
    y: () => gsap.utils.random(-window.innerHeight * 0.45, window.innerHeight * 0.45),
    rotation: () => gsap.utils.random(-90, 90),
    scale: () => gsap.utils.random(0.1, 2.0),
    opacity: 0,
    duration: 1.0,
    ease: 'power3.out',
    stagger: { each: 0.04, from: 'random' },
    delay: 0.1
  });

  const heroH1 = document.querySelector('.hero-text h1');
  heroH1.addEventListener('mouseenter', () => {
    gsap.to(heroChars, {
      x: () => gsap.utils.random(-50, 50),
      y: () => gsap.utils.random(-35, 35),
      rotation: () => gsap.utils.random(-25, 25),
      duration: 0.4,
      ease: 'power2.out',
      stagger: { each: 0.02, from: 'random' }
    });
  });
  heroH1.addEventListener('mouseleave', () => {
    gsap.to(heroChars, {
      x: 0, y: 0, rotation: 0,
      duration: 0.6,
      ease: 'power3.out',
      stagger: { each: 0.02, from: 'center' }
    });
  });

  /* ── HERO STRIP INFINITE SCROLL ON HOVER ── */
  const heroStrip = document.getElementById('heroStrip');
  const heroStripWrap = document.getElementById('heroStripWrap');
  const STRIP_W = 1600;
  const SCROLL_DUR = 10;
  let scrolling = false;

  function loopScroll(startX) {
    const dist = Math.abs(-STRIP_W - startX);
    const dur = (dist / STRIP_W) * SCROLL_DUR;
    gsap.to(heroStrip, {
      x: -STRIP_W,
      duration: dur,
      ease: 'none',
      onComplete() {
        if (!scrolling) return;
        gsap.set(heroStrip, { x: 0 });
        loopScroll(0);
      }
    });
  }

  heroStripWrap.addEventListener('mouseenter', () => {
    scrolling = true;
    gsap.killTweensOf(heroStrip);
    loopScroll(gsap.getProperty(heroStrip, 'x') || 0);
  });

  heroStripWrap.addEventListener('mouseleave', () => {
    scrolling = false;
    gsap.killTweensOf(heroStrip);
    gsap.to(heroStrip, { x: 0, duration: 1.5, ease: 'power2.out' });
  });

  /* ── PAGE TRANSITION (ic_arrow → work.html) ── */
  const pageCurtain = document.getElementById('pageCurtain');
  const icArrow = document.getElementById('icArrow');
  let transitioning = false;

  icArrow.addEventListener('click', () => {
    if (transitioning) return;
    transitioning = true;
    gsap.timeline()
      .to(pageCurtain, {
        scaleX: 1,
        duration: 0.65,
        ease: 'power3.inOut',
        transformOrigin: 'left center'
      })
      .call(() => { window.location.href = 'work.html'; });
  });

  /* ── SERVICE PREVIEW ── */
  const servicePreview = document.getElementById('servicePreview');
  const servicePreviewImg = document.getElementById('servicePreviewImg');

  const serviceImages = [
    { text: 'Website&Platform Design', src: 'https://picsum.photos/seed/s1/200/200' },
    { text: 'UIUX Design',             src: 'https://picsum.photos/seed/s2/200/200' },
    { text: 'Design System',           src: 'https://picsum.photos/seed/s3/200/200' },
    { text: 'Service Planning',        src: 'https://picsum.photos/seed/s4/200/200' },
    { text: 'Marketing',               src: 'https://picsum.photos/seed/s5/200/200' },
  ];

  gsap.set(servicePreview, { scale: 0.85 });

  document.querySelectorAll('.s2-row span').forEach(span => {
    const match = serviceImages.find(s => s.text === span.textContent.trim());
    span.addEventListener('mouseenter', () => {
      if (match) servicePreviewImg.src = match.src;
      gsap.to(servicePreview, { opacity: 1, scale: 1, duration: 0.35, ease: 'power2.out' });
    });
    span.addEventListener('mouseleave', () => {
      gsap.to(servicePreview, { opacity: 0, scale: 0.85, duration: 0.25, ease: 'power2.in' });
    });
  });

  document.addEventListener('mousemove', (e) => {
    gsap.to(servicePreview, {
      x: e.clientX,
      y: e.clientY,
      duration: 0.45,
      ease: 'power2.out',
      overwrite: 'auto'
    });
  });

  /* ── SECTION 2 SCROLL ANIMATION ── */
  gsap.timeline({
    scrollTrigger: {
      trigger: '.section2',
      start: 'top 80%',
      toggleActions: 'play none none none'
    }
  })
  .from('.s2-sub', {
    scale: 0.88,
    opacity: 0,
    duration: 0.85,
    ease: 'power3.out',
    transformOrigin: 'left center'
  })
  .from('.s2-title', {
    scale: 0.88,
    opacity: 0,
    duration: 0.95,
    ease: 'power3.out',
    transformOrigin: 'left center'
  }, '-=0.55')
  .from('.s2-row span', {
    scale: 0.88,
    opacity: 0,
    duration: 0.75,
    ease: 'power3.out',
    stagger: 0.1,
    transformOrigin: 'left center'
  }, '-=0.5');
</script>
</body>
</html>
