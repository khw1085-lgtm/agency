<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGO</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap" rel="stylesheet">
<script type="module" src="https://cdn.spline.design/@splinetool/hana-viewer@1.2.52/hana-viewer.js"></script>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
  }

  * {
    margin: 0;
    padding: 0;
  }

  html,
  body {
    width: 100%;
    min-height: 100%;
    background: #000;
    color: #fff;
    cursor: none;
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body {
    min-width: 320px;
  }

  .page-section {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  .thumbnail-main {
    position: relative;
    display: flex;
    align-items: center;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    perspective: 1200px;
    perspective-origin: 50% 35%;
    background:
      radial-gradient(circle at 18% 74%, rgba(20, 72, 255, .2), transparent 18%),
      linear-gradient(180deg, #000 0%, #030303 100%);
  }

  .spline-section {
    display: flex;
    align-items: stretch;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    background: #000;
  }

  hana-viewer {
    display: block;
    width: 100%;
    height: 100%;
  }

  .thumbnail-main::before,
  .thumbnail-main::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    z-index: 3;
    width: 18vw;
    pointer-events: none;
  }

  .thumbnail-main::before {
    left: 0;
    background: linear-gradient(90deg, #000 0%, rgba(0, 0, 0, .75) 48%, transparent 100%);
  }

  .thumbnail-main::after {
    right: 0;
    background: linear-gradient(270deg, #000 0%, rgba(0, 0, 0, .75) 48%, transparent 100%);
  }

  .orbit-stage {
    position: absolute;
    left: 50%;
    top: 50%;
    width: max-content;
    transform: translate(-50%, -46%) rotate(-9deg) rotateX(58deg);
    transform-origin: center;
    transform-style: preserve-3d;
    transition: transform 1.05s cubic-bezier(.16, 1, .3, 1);
  }

  .thumbnail-track {
    --thumb-gap: 28px;

    display: flex;
    align-items: center;
    gap: var(--thumb-gap);
    width: max-content;
    animation: thumbnail-flow 42s linear infinite;
    transform-style: preserve-3d;
    will-change: transform;
  }

  .thumb-card {
    position: relative;
    width: 400px;
    height: 500px;
    flex: 0 0 auto;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, .14);
    border-radius: 30px;
    background: #111;
    box-shadow:
      0 26px 42px rgba(0, 0, 0, .5),
      0 74px 120px rgba(0, 0, 0, .68);
    transform: translateZ(0);
    transition:
      opacity .9s cubic-bezier(.16, 1, .3, 1),
      filter .9s cubic-bezier(.16, 1, .3, 1),
      transform 1s cubic-bezier(.16, 1, .3, 1);
    transition-delay: calc(var(--card-index, 0) * 58ms);
    backface-visibility: hidden;
  }

  .thumb-card img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: saturate(.9) contrast(1.08) brightness(.82);
    transform: scale(1.04);
  }

  .thumb-card::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(120deg, rgba(255, 255, 255, .16), transparent 34%),
      linear-gradient(180deg, transparent 50%, rgba(0, 0, 0, .34) 100%);
    pointer-events: none;
  }

  .thumb-label {
    display: none;
  }

  .hero-copy {
    position: absolute;
    left: 50%;
    top: calc(38% - 50px);
    z-index: 6;
    color: #fff;
    font-family: "Roboto", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: clamp(72px, 15vw, 260px);
    font-weight: 500;
    line-height: .82;
    letter-spacing: 0;
    text-transform: capitalize;
    text-align: center;
    white-space: nowrap;
    pointer-events: none;
    transform: translate(-50%, -50%);
    text-shadow: 0 0 18px rgba(255, 255, 255, .16);
    transition:
      opacity .95s cubic-bezier(.16, 1, .3, 1),
      filter .95s cubic-bezier(.16, 1, .3, 1),
      transform 1.05s cubic-bezier(.16, 1, .3, 1);
  }

  .thumbnail-main.is-scroll-down .orbit-stage {
    transform: translate(-50%, -36%) rotate(-9deg) rotateX(64deg) scale(.94);
  }

  .thumbnail-main.is-scroll-up .orbit-stage {
    transform: translate(-50%, -56%) rotate(-9deg) rotateX(52deg) scale(1.03);
  }

  .thumbnail-main.is-scroll-down .hero-copy {
    opacity: .62;
    filter: blur(1px);
    transform: translate(-50%, -50%) translateY(-92px) scale(.96);
  }

  .thumbnail-main.is-scroll-up .hero-copy {
    opacity: .78;
    filter: blur(.6px);
    transform: translate(-50%, -50%) translateY(72px) scale(1.02);
  }

  .thumbnail-main.is-scroll-down .thumb-card {
    opacity: .72;
    filter: brightness(.66) blur(.8px);
    transform: translateY(90px) translateZ(-36px) scale(.96);
  }

  .thumbnail-main.is-scroll-up .thumb-card {
    opacity: .84;
    filter: brightness(.78) blur(.4px);
    transform: translateY(-74px) translateZ(24px) scale(1.02);
  }

  .custom-cursor {
    position: fixed;
    left: 0;
    top: 0;
    z-index: 20;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 24px rgba(255, 255, 255, .6);
    pointer-events: none;
    transform: translate(-50%, -50%);
    will-change: transform;
  }

  @keyframes thumbnail-flow {
    from {
      transform: translateX(0);
    }

    to {
      transform: translateX(calc(-50% - (var(--thumb-gap) / 2)));
    }
  }

  @media (max-width: 760px) {
    .orbit-stage {
      transform: translate(-50%, -46%) rotate(-7deg) rotateX(54deg);
    }

    .thumbnail-main.is-scroll-down .orbit-stage {
      transform: translate(-50%, -38%) rotate(-7deg) rotateX(60deg) scale(.96);
    }

    .thumbnail-main.is-scroll-up .orbit-stage {
      transform: translate(-50%, -54%) rotate(-7deg) rotateX(48deg) scale(1.02);
    }

    .thumbnail-track {
      --thumb-gap: 22px;

      animation-duration: 36s;
    }

    .hero-copy {
      top: calc(36% - 50px);
      font-size: clamp(58px, 22vw, 128px);
    }

    .custom-cursor {
      width: 22px;
      height: 22px;
    }
  }
</style>
</head>
<body>
  <span class="custom-cursor" aria-hidden="true"></span>

  <main class="thumbnail-main page-section" aria-label="흐르는 썸네일 메인 화면">
    <h1 class="hero-copy">interactive</h1>

    <div class="orbit-stage">
      <div class="thumbnail-track">
        <article class="thumb-card">
          <img src="https://picsum.photos/seed/agency-thumb-01/900/1125" alt="">
          <div class="thumb-label"><span>Project 01</span><span>Brand</span></div>
        </article>
        <article class="thumb-card">
          <img src="https://picsum.photos/seed/agency-thumb-02/900/1125" alt="">
          <div class="thumb-label"><span>Project 02</span><span>UXUI</span></div>
        </article>
        <article class="thumb-card">
          <img src="https://picsum.photos/seed/agency-thumb-03/900/1125" alt="">
          <div class="thumb-label"><span>Project 03</span><span>Motion</span></div>
        </article>
        <article class="thumb-card">
          <img src="https://picsum.photos/seed/agency-thumb-04/900/1125" alt="">
          <div class="thumb-label"><span>Project 04</span><span>Commerce</span></div>
        </article>
        <article class="thumb-card">
          <img src="https://picsum.photos/seed/agency-thumb-05/900/1125" alt="">
          <div class="thumb-label"><span>Project 05</span><span>Platform</span></div>
        </article>
        <article class="thumb-card">
          <img src="https://picsum.photos/seed/agency-thumb-06/900/1125" alt="">
          <div class="thumb-label"><span>Project 06</span><span>Digital</span></div>
        </article>

        <article class="thumb-card" aria-hidden="true">
          <img src="https://picsum.photos/seed/agency-thumb-01/900/1125" alt="">
          <div class="thumb-label"><span>Project 01</span><span>Brand</span></div>
        </article>
        <article class="thumb-card" aria-hidden="true">
          <img src="https://picsum.photos/seed/agency-thumb-02/900/1125" alt="">
          <div class="thumb-label"><span>Project 02</span><span>UXUI</span></div>
        </article>
        <article class="thumb-card" aria-hidden="true">
          <img src="https://picsum.photos/seed/agency-thumb-03/900/1125" alt="">
          <div class="thumb-label"><span>Project 03</span><span>Motion</span></div>
        </article>
        <article class="thumb-card" aria-hidden="true">
          <img src="https://picsum.photos/seed/agency-thumb-04/900/1125" alt="">
          <div class="thumb-label"><span>Project 04</span><span>Commerce</span></div>
        </article>
        <article class="thumb-card" aria-hidden="true">
          <img src="https://picsum.photos/seed/agency-thumb-05/900/1125" alt="">
          <div class="thumb-label"><span>Project 05</span><span>Platform</span></div>
        </article>
        <article class="thumb-card" aria-hidden="true">
          <img src="https://picsum.photos/seed/agency-thumb-06/900/1125" alt="">
          <div class="thumb-label"><span>Project 06</span><span>Digital</span></div>
        </article>
      </div>
    </div>
  </main>

  <section class="spline-section page-section" aria-label="Spline 인터랙션 섹션">
    <hana-viewer url="https://prod.spline.design/AdT8751fFGUhKRZt-JkB/scene.hanacode"></hana-viewer>
  </section>

  <script>
    const main = document.querySelector('.thumbnail-main');
    const cards = document.querySelectorAll('.thumb-card');
    const cursor = document.querySelector('.custom-cursor');
    let cursorX = window.innerWidth / 2;
    let cursorY = window.innerHeight / 2;
    let scrollResetTimer;
    let touchStartY = 0;

    cards.forEach((card, index) => {
      card.style.setProperty('--card-index', index % 6);
    });

    function moveCursor() {
      cursor.style.transform = `translate(${cursorX}px, ${cursorY}px) translate(-50%, -50%)`;
      requestAnimationFrame(moveCursor);
    }

    window.addEventListener('mousemove', (event) => {
      cursorX = event.clientX;
      cursorY = event.clientY;
    });

    function runScrollAnimation(direction) {
      const activeClass = direction > 0 ? 'is-scroll-down' : 'is-scroll-up';
      const inactiveClass = direction > 0 ? 'is-scroll-up' : 'is-scroll-down';

      main.classList.remove(inactiveClass);
      main.classList.add(activeClass);
      window.clearTimeout(scrollResetTimer);
      scrollResetTimer = window.setTimeout(() => {
        main.classList.remove(activeClass);
      }, 1180);
    }

    window.addEventListener('wheel', (event) => {
      if (Math.abs(event.deltaY) < 4) return;

      runScrollAnimation(event.deltaY);
    }, { passive: true });

    window.addEventListener('touchstart', (event) => {
      touchStartY = event.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchend', (event) => {
      const touchEndY = event.changedTouches[0].clientY;
      const deltaY = touchStartY - touchEndY;

      if (Math.abs(deltaY) < 24) return;
      runScrollAnimation(deltaY);
    }, { passive: true });

    moveCursor();
  </script>
</body>
</html>
