<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGO — 함께 만드는 변화</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    min-height: 100%;
    background: #fff;
    color: #000;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ─────────────────────────────────────── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 50px;
    background: #fff;
    z-index: 100;
  }

  .logo {
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -.01em;
    color: #000;
    text-decoration: none;
  }

  .menu-btn {
    width: 40px;
    height: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
  }
  .menu-btn span {
    display: block;
    width: 24px;
    height: 2px;
    background: #000;
    transition: all .3s ease;
  }
  .menu-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .menu-btn.open span:nth-child(2) { opacity: 0; }
  .menu-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* ── HERO ────────────────────────────────────────── */
  .hero {
    height: 100vh;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    padding: 0 50px;
    padding-top: 90px;
    overflow: visible;
  }

  .hero-text h1 {
    font-size: 66px;
    font-weight: 600;
    line-height: 1.1;
    color: #000;
    letter-spacing: -.02em;
  }

  /* ── HERO CARDS ──────────────────────────────────── */
  .hero-cards {
    position: relative;
    width: 660px;
    height: 650px;
    flex-shrink: 0;
    z-index: 200;
  }

  .card-wrap {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-1-wrap { left: 0;    top: 67px; width: 516px; height: 583px; }
  .card-3-wrap { left: 65px; top: 24px; width: 514px; height: 582px; }
  .card-4-wrap { left: 65px; top: 0;    width: 594px; height: 628px; }

  .card {
    background: #d9d9d9;
    overflow: hidden;
    flex-shrink: 0;
  }
  .card-1 { width: 400px; height: 500px; transform: rotate(-15deg); }
  .card-2 {
    position: absolute;
    left: 82px; top: 67px;
    width: 400px; height: 500px;
    background: #d9d9d9;
    overflow: hidden;
  }
  .card-3 { width: 400px; height: 500px; transform: rotate(15deg); }
  .card-4 { width: 400px; height: 500px; transform: rotate(30deg); }

  .card img, .card-2 img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── PAGE CURTAIN ────────────────────────────────── */
  .page-curtain {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 10000;
    transform: scaleX(0);
    transform-origin: left center;
    pointer-events: none;
  }

  /* ── HOVER CURSOR ────────────────────────────────── */
  .hover-cursor {
    position: fixed;
    top: 0; left: 0;
    width: 160px;
    height: 160px;
    margin-left: -80px;
    margin-top: -80px;
    background: #000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
  }
  .hover-cursor span {
    font-size: 32px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -.02em;
    line-height: 1;
  }

  /* ── FULL-SCREEN NAV OVERLAY ──────────────────────── */
  .nav-overlay {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 600px;
    background: #000;
    z-index: 101;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 50px;
    transform: translateX(100%);
    pointer-events: none;
    transition: transform .45s cubic-bezier(.77,0,.18,1);
  }
  .nav-overlay.open {
    transform: translateX(0);
    pointer-events: all;
  }
  .nav-overlay nav {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .nav-overlay nav a {
    font-size: 40px;
    font-weight: 600;
    color: #fff;
    text-decoration: none;
    letter-spacing: -.02em;
    line-height: 1.1;
    transition: opacity .2s;
  }
  .nav-overlay nav a:hover { opacity: .4; }

  .nav-close {
    position: absolute;
    top: 25px;
    right: 50px;
    width: 40px;
    height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
  }
  .nav-close span {
    display: block;
    width: 24px;
    height: 2px;
    background: #fff;
    position: absolute;
  }
  .nav-close span:nth-child(1) { transform: rotate(45deg); }
  .nav-close span:nth-child(2) { transform: rotate(-45deg); }

  /* nav footer */
  .nav-footer {
    position: absolute;
    bottom: 40px;
    left: 50px;
    font-size: 14px;
    color: rgba(255,255,255,.45);
    letter-spacing: .01em;
  }

  /* ── RESPONSIVE ─────────────────────────────────── */
  @media (max-width: 768px) {
    header { padding: 0 24px; height: 64px; }
    .hero { padding: 0 24px; padding-top: 64px; flex-direction: column; justify-content: center; gap: 32px; }
    .hero-text h1 { font-size: 36px; }
    .hero-cards { width: 100%; max-width: 300px; height: 296px; }
    .card-1-wrap { width: 235px; height: 266px; top: 31px; }
    .card-1 { width: 182px; height: 228px; }
    .card-2 { left: 37px; top: 31px; width: 182px; height: 228px; }
    .card-3-wrap { left: 30px; top: 11px; width: 234px; height: 265px; }
    .card-3 { width: 182px; height: 228px; }
    .card-4-wrap { left: 30px; top: 0; width: 271px; height: 286px; }
    .card-4 { width: 182px; height: 228px; }
    .nav-overlay { padding: 0 24px; }
    .nav-overlay nav a { font-size: 36px; }
    .nav-footer { left: 24px; }
  }
</style>
</head>
<body>

<!-- PAGE CURTAIN -->
<div class="page-curtain" id="pageCurtain"></div>

<!-- HOVER CURSOR -->
<div class="hover-cursor" id="hoverCursor"><span>WORK</span></div>

<!-- NAV OVERLAY -->
<div class="nav-overlay" id="navOverlay" style="padding: 0px 50px;">
  <button class="nav-close" id="navClose" aria-label="메뉴 닫기">
    <span></span>
    <span></span>
  </button>
  <nav style="gap: 20px;">
    <a href="#">Work</a>
    <a href="#">Services</a>
    <a href="#">Process</a>
    <a href="#">Contact</a>
  </nav>
  <div class="nav-footer">hello@axon.studio &nbsp;·&nbsp; Seoul, Korea</div>
</div>

<!-- HEADER -->
<header>
  <a class="logo" href="#">LOGO</a>
  <button class="menu-btn" id="menuBtn" aria-label="메뉴 열기">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>We are creators<br>for movement</h1>
  </div>
  <div class="hero-cards">
    <div class="card-wrap card-1-wrap">
      <div class="card card-1">
        <img src="https://www.figma.com/api/mcp/asset/5b3cb231-83ed-4f2a-8838-7728d6bb9492" alt="">
      </div>
    </div>
    <div class="card-2">
      <img src="https://www.figma.com/api/mcp/asset/e97f4a1d-5ca1-4e09-8cf0-c4b328970bfb" alt="">
    </div>
    <div class="card-wrap card-3-wrap">
      <div class="card card-3">
        <img src="https://www.figma.com/api/mcp/asset/ef254bef-c0f4-4269-b12a-ff0e90b01bdd" alt="">
      </div>
    </div>
    <div class="card-wrap card-4-wrap">
      <div class="card card-4">
        <img src="https://www.figma.com/api/mcp/asset/b78771c3-01c3-477a-ae40-84945d9c5c80" alt="">
      </div>
    </div>
  </div>
</section>

<script>
  /* ── NAV ── */
  const btn = document.getElementById('menuBtn');
  const overlay = document.getElementById('navOverlay');
  const closeBtn = document.getElementById('navClose');

  function toggleMenu(force) {
    const isOpen = force !== undefined ? force : !overlay.classList.contains('open');
    overlay.classList.toggle('open', isOpen);
    btn.classList.toggle('open', isOpen);
  }

  btn.addEventListener('click', () => toggleMenu());
  closeBtn.addEventListener('click', () => toggleMenu(false));

  /* ── CARD DROP (GSAP) ── */
  const heroCards = document.querySelector('.hero-cards');
  const dropTargets = ['.card-1-wrap', '.card-2', '.card-3-wrap', '.card-4-wrap'];

  gsap.from(dropTargets, {
    y: '-120vh',
    opacity: 0,
    duration: 1.4,
    ease: 'back.out(1.4)',
    stagger: 0.2,
    onComplete() {
      heroCards.style.zIndex = '';
    }
  });

  /* ── HOVER CURSOR (GSAP) ── */
  const cursor = document.getElementById('hoverCursor');

  gsap.set(cursor, { scale: 0.6 });

  document.addEventListener('mousemove', (e) => {
    gsap.to(cursor, {
      x: e.clientX,
      y: e.clientY,
      duration: 0.35,
      ease: 'power2.out',
      overwrite: 'auto'
    });
  });

  heroCards.addEventListener('mouseenter', () => {
    document.body.style.cursor = 'none';
    gsap.to(cursor, { opacity: 1, scale: 1, duration: 0.28, ease: 'back.out(1.6)' });
  });

  heroCards.addEventListener('mouseleave', () => {
    document.body.style.cursor = '';
    gsap.to(cursor, { opacity: 0, scale: 0.6, duration: 0.2, ease: 'power2.in' });
  });

  /* ── PAGE TRANSITION ── */
  const pageCurtain = document.getElementById('pageCurtain');
  let transitioning = false;

  heroCards.addEventListener('click', () => {
    if (transitioning) return;
    transitioning = true;

    // 커서 즉시 숨김
    gsap.to(cursor, { opacity: 0, scale: 0.6, duration: 0.15 });
    document.body.style.cursor = '';

    // 카드들이 살짝 뒤로 물러나며 커튼 등장
    gsap.to(['.card-1-wrap', '.card-2', '.card-3-wrap', '.card-4-wrap'], {
      scale: 0.92,
      opacity: 0,
      duration: 0.35,
      ease: 'power2.in',
      stagger: 0.05
    });

    gsap.timeline()
      .to(pageCurtain, {
        scaleX: 1,
        duration: 0.65,
        ease: 'power3.inOut',
        transformOrigin: 'left center',
        delay: 0.2
      })
      .call(() => { window.location.href = 'work.html'; });
  });
</script>
</body>
</html>
