<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGO — 함께 만드는 변화</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    scroll-snap-type: y mandatory;
  }

  html, body {
    width: 100%;
    min-height: 100%;
    background: #fff;
    color: #000;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ─────────────────────────────────────── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 50px;
    background: #fff;
    z-index: 100;
  }

  .logo {
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -.01em;
    color: #000;
    text-decoration: none;
  }

  .menu-btn {
    width: 40px;
    height: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
  }
  .menu-btn span {
    display: block;
    width: 24px;
    height: 2px;
    background: #000;
    transition: all .3s ease;
  }
  .menu-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .menu-btn.open span:nth-child(2) { opacity: 0; }
  .menu-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* ── HERO ────────────────────────────────────────── */
  .hero {
    scroll-snap-align: start;
    height: 100vh;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    padding: 0 50px;
    padding-top: 90px;
    overflow: visible;
  }

  .hero-text h1 {
    font-size: 66px;
    font-weight: 600;
    line-height: 1.1;
    color: #000;
    letter-spacing: -.02em;
    cursor: default;
  }

  .hero-text h1 .word {
    display: inline-block;
  }
  .hero-text h1 .char {
    display: inline-block;
    will-change: transform;
  }

  /* ── HERO CARDS ──────────────────────────────────── */
  .hero-cards {
    position: relative;
    width: 660px;
    height: 650px;
    flex-shrink: 0;
    z-index: 200;
  }

  .card-wrap {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-1-wrap { left: 0;    top: 67px; width: 516px; height: 583px; }
  .card-3-wrap { left: 65px; top: 24px; width: 514px; height: 582px; }
  .card-4-wrap { left: 65px; top: 0;    width: 594px; height: 628px; }

  .card {
    background: #d9d9d9;
    overflow: hidden;
    flex-shrink: 0;
  }
  .card-1 { width: 400px; height: 500px; transform: rotate(-15deg); }
  .card-2 {
    position: absolute;
    left: 82px; top: 67px;
    width: 400px; height: 500px;
    background: #d9d9d9;
    overflow: hidden;
  }
  .card-3 { width: 400px; height: 500px; transform: rotate(15deg); }
  .card-4 { width: 400px; height: 500px; transform: rotate(30deg); }

  .card img, .card-2 img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── PAGE CURTAIN ────────────────────────────────── */
  .page-curtain {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 10000;
    transform: scaleX(0);
    transform-origin: left center;
    pointer-events: none;
  }

  /* ── HOVER CURSOR ────────────────────────────────── */
  .hover-cursor {
    position: fixed;
    top: 0; left: 0;
    width: 160px;
    height: 160px;
    margin-left: -80px;
    margin-top: -80px;
    background: #000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
  }
  .hover-cursor span {
    font-size: 32px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -.02em;
    line-height: 1;
  }

  /* ── FULL-SCREEN NAV OVERLAY ──────────────────────── */
  .nav-overlay {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 600px;
    background: #000;
    z-index: 500;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 50px;
    transform: translateX(100%);
    pointer-events: none;
    transition: transform .45s cubic-bezier(.77,0,.18,1);
  }
  .nav-overlay.open {
    transform: translateX(0);
    pointer-events: all;
  }
  .nav-overlay nav {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .nav-overlay nav a {
    font-size: 40px;
    font-weight: 600;
    color: #fff;
    text-decoration: none;
    letter-spacing: -.02em;
    line-height: 1.1;
    transition: opacity .2s;
  }
  .nav-overlay nav a:hover { opacity: .4; }

  .nav-close {
    position: absolute;
    top: 25px;
    right: 50px;
    width: 40px;
    height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
  }
  .nav-close span {
    display: block;
    width: 24px;
    height: 2px;
    background: #fff;
    position: absolute;
  }
  .nav-close span:nth-child(1) { transform: rotate(45deg); }
  .nav-close span:nth-child(2) { transform: rotate(-45deg); }

  /* nav footer */
  .nav-footer {
    position: absolute;
    bottom: 40px;
    left: 50px;
    font-size: 14px;
    color: rgba(255,255,255,.45);
    letter-spacing: .01em;
  }

  /* ── SECTION 2 ──────────────────────────────────── */
  .section2 {
    scroll-snap-align: start;
    height: 100vh;
    background: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 50px;
    gap: 51px;
  }

  .s2-heading {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .s2-sub {
    font-size: 40px;
    font-weight: 600;
    color: #000;
    line-height: 1.1;
    letter-spacing: -.02em;
  }

  .s2-title {
    font-size: 100px;
    font-weight: 600;
    color: #000;
    line-height: 1;
    letter-spacing: -.03em;
  }

  .s2-services {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .s2-row {
    display: flex;
    align-items: center;
    gap: 30px;
    flex-wrap: nowrap;
  }

  .s2-row span {
    font-size: 64px;
    font-weight: 600;
    color: #c8c8c8;
    line-height: 1.1;
    letter-spacing: -.02em;
    white-space: nowrap;
    transition: color 0.3s ease;
    cursor: default;
  }
  .s2-row span:hover { color: #000; }

  /* ── SERVICE PREVIEW IMAGE ── */
  .service-preview {
    position: fixed;
    top: 0; left: 0;
    width: 200px;
    height: 200px;
    margin-left: 16px;
    margin-top: 16px;
    pointer-events: none;
    z-index: 400;
    opacity: 0;
    overflow: hidden;
  }
  .service-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── RESPONSIVE ─────────────────────────────────── */
  @media (max-width: 768px) {
    header { padding: 0 24px; height: 64px; }
    .hero { padding: 0 24px; padding-top: 64px; flex-direction: column; justify-content: center; gap: 32px; }
    .hero-text h1 { font-size: 36px; }
    .hero-cards { width: 100%; max-width: 300px; height: 296px; }
    .card-1-wrap { width: 235px; height: 266px; top: 31px; }
    .card-1 { width: 182px; height: 228px; }
    .card-2 { left: 37px; top: 31px; width: 182px; height: 228px; }
    .card-3-wrap { left: 30px; top: 11px; width: 234px; height: 265px; }
    .card-3 { width: 182px; height: 228px; }
    .card-4-wrap { left: 30px; top: 0; width: 271px; height: 286px; }
    .card-4 { width: 182px; height: 228px; }
    .nav-overlay { padding: 0 24px; }
    .nav-overlay nav a { font-size: 36px; }
    .nav-footer { left: 24px; }
  }
</style>
</head>
<body>

<!-- SERVICE PREVIEW -->
<div class="service-preview" id="servicePreview">
  <img id="servicePreviewImg" src="" alt="">
</div>

<!-- PAGE CURTAIN -->
<div class="page-curtain" id="pageCurtain"></div>

<!-- HOVER CURSOR -->
<div class="hover-cursor" id="hoverCursor"><span>WORK</span></div>

<!-- NAV OVERLAY -->
<div class="nav-overlay" id="navOverlay" style="padding: 0px 50px;">
  <button class="nav-close" id="navClose" aria-label="메뉴 닫기">
    <span></span>
    <span></span>
  </button>
  <nav style="gap: 20px;">
    <a href="#">Work</a>
    <a href="#">Services</a>
    <a href="#">Process</a>
    <a href="#">Contact</a>
  </nav>
  <div class="nav-footer">hello@axon.studio &nbsp;·&nbsp; Seoul, Korea</div>
</div>

<!-- HEADER -->
<header>
  <a class="logo" href="#">LOGO</a>
  <button class="menu-btn" id="menuBtn" aria-label="메뉴 열기">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1><span class="word">We</span> <span class="word">are</span> <span class="word">creators</span><br><span class="word">for</span> <span class="word">movement</span></h1>
  </div>
  <div class="hero-cards">
    <div class="card-wrap card-1-wrap">
      <div class="card card-1">
        <img src="https://www.figma.com/api/mcp/asset/5b3cb231-83ed-4f2a-8838-7728d6bb9492" alt="">
      </div>
    </div>
    <div class="card-2">
      <img src="https://www.figma.com/api/mcp/asset/e97f4a1d-5ca1-4e09-8cf0-c4b328970bfb" alt="">
    </div>
    <div class="card-wrap card-3-wrap">
      <div class="card card-3">
        <img src="https://www.figma.com/api/mcp/asset/ef254bef-c0f4-4269-b12a-ff0e90b01bdd" alt="">
      </div>
    </div>
    <div class="card-wrap card-4-wrap">
      <div class="card card-4">
        <img src="https://www.figma.com/api/mcp/asset/b78771c3-01c3-477a-ae40-84945d9c5c80" alt="">
      </div>
    </div>
  </div>
</section>

<!-- SECTION 2 -->
<section class="section2">
  <div class="s2-heading">
    <p class="s2-sub">아워스튜디오의 하는일 살펴보기</p>
    <p class="s2-title">Our Studio</p>
  </div>
  <div class="s2-services">
    <div class="s2-row">
      <span>Website&amp;Platform Design</span>
      <span>UIUX Design</span>
    </div>
    <div class="s2-row">
      <span>Design System</span>
      <span>Service Planning</span>
      <span>Marketing</span>
    </div>
  </div>
</section>

<script>
  gsap.registerPlugin(ScrollTrigger);

  /* ── NAV ── */
  const btn = document.getElementById('menuBtn');
  const overlay = document.getElementById('navOverlay');
  const closeBtn = document.getElementById('navClose');

  function toggleMenu(force) {
    const isOpen = force !== undefined ? force : !overlay.classList.contains('open');
    overlay.classList.toggle('open', isOpen);
    btn.classList.toggle('open', isOpen);
  }

  btn.addEventListener('click', () => toggleMenu());
  closeBtn.addEventListener('click', () => toggleMenu(false));

  /* ── CARD DROP (GSAP) ── */
  const heroCards = document.querySelector('.hero-cards');
  const dropTargets = ['.card-1-wrap', '.card-2', '.card-3-wrap', '.card-4-wrap'];
  let dropComplete = false;

  /* ── HERO TEXT SCATTER → ASSEMBLE (char by char) ── */
  document.querySelectorAll('.hero-text .word').forEach(word => {
    word.innerHTML = word.textContent.split('').map(c => `<span class="char">${c}</span>`).join('');
  });
  const heroChars = document.querySelectorAll('.hero-text .char');

  gsap.from(heroChars, {
    x: () => gsap.utils.random(-window.innerWidth * 0.5, window.innerWidth * 0.5),
    y: () => gsap.utils.random(-window.innerHeight * 0.45, window.innerHeight * 0.45),
    rotation: () => gsap.utils.random(-90, 90),
    scale: () => gsap.utils.random(0.1, 2.0),
    opacity: 0,
    duration: 1.0,
    ease: 'power3.out',
    stagger: { each: 0.04, from: 'random' },
    delay: 0.1
  });

  /* 호버: 글자가 살짝 흩어졌다가 다시 모임 */
  const heroH1 = document.querySelector('.hero-text h1');
  heroH1.addEventListener('mouseenter', () => {
    gsap.to(heroChars, {
      x: () => gsap.utils.random(-50, 50),
      y: () => gsap.utils.random(-35, 35),
      rotation: () => gsap.utils.random(-25, 25),
      duration: 0.4,
      ease: 'power2.out',
      stagger: { each: 0.02, from: 'random' }
    });
  });
  heroH1.addEventListener('mouseleave', () => {
    gsap.to(heroChars, {
      x: 0, y: 0, rotation: 0,
      duration: 0.6,
      ease: 'power3.out',
      stagger: { each: 0.02, from: 'center' }
    });
  });

  gsap.from(dropTargets, {
    y: '-120vh',
    duration: 1.4,
    ease: 'back.out(1.4)',
    stagger: 0.2,
    delay: 0.8,
    onComplete() {
      heroCards.style.zIndex = '';
      dropComplete = true;
    }
  });

  /* ── PARALLAX HOVER ── */
  const parallaxCards = [
    { sel: '.card-1-wrap', mx: 0.5, my: 0.35, tilt:  3 },
    { sel: '.card-2',       mx: 0.9, my: 0.60, tilt: -5 },
    { sel: '.card-3-wrap', mx: 1.3, my: 0.85, tilt:  7 },
    { sel: '.card-4-wrap', mx: 1.8, my: 1.10, tilt: -9 },
  ].map(c => ({ ...c, el: document.querySelector(c.sel) }));

  const MAX_PX = 28;

  heroCards.addEventListener('mousemove', (e) => {
    if (!dropComplete) return;
    const r  = heroCards.getBoundingClientRect();
    const nx = (e.clientX - (r.left + r.width  / 2)) / (r.width  / 2);
    const ny = (e.clientY - (r.top  + r.height / 2)) / (r.height / 2);

    parallaxCards.forEach(({ el, mx, my, tilt }) => {
      gsap.to(el, {
        x: nx * mx * MAX_PX,
        y: ny * my * MAX_PX,
        rotation: nx * tilt,
        duration: 0.55,
        ease: 'power2.out',
        overwrite: 'auto'
      });
    });
  });

  /* ── HOVER CURSOR (GSAP) ── */
  const cursor = document.getElementById('hoverCursor');

  gsap.set(cursor, { scale: 0.6 });

  document.addEventListener('mousemove', (e) => {
    gsap.to(cursor, {
      x: e.clientX,
      y: e.clientY,
      duration: 0.35,
      ease: 'power2.out',
      overwrite: 'auto'
    });
  });

  heroCards.addEventListener('mouseenter', () => {
    document.body.style.cursor = 'none';
    gsap.to(cursor, { opacity: 1, scale: 1, duration: 0.28, ease: 'back.out(1.6)' });
  });

  heroCards.addEventListener('mouseleave', () => {
    document.body.style.cursor = '';
    gsap.to(cursor, { opacity: 0, scale: 0.6, duration: 0.2, ease: 'power2.in' });

    if (dropComplete) {
      parallaxCards.forEach(({ el }) => {
        gsap.to(el, {
          x: 0, y: 0, rotation: 0,
          duration: 0.9,
          ease: 'power3.out',
          overwrite: 'auto'
        });
      });
    }
  });

  /* ── PAGE TRANSITION ── */
  const pageCurtain = document.getElementById('pageCurtain');
  let transitioning = false;

  heroCards.addEventListener('click', () => {
    if (transitioning) return;
    transitioning = true;

    // 커서 즉시 숨김
    gsap.to(cursor, { opacity: 0, scale: 0.6, duration: 0.15 });
    document.body.style.cursor = '';

    // 카드들이 살짝 뒤로 물러나며 커튼 등장
    gsap.to(['.card-1-wrap', '.card-2', '.card-3-wrap', '.card-4-wrap'], {
      scale: 0.92,
      opacity: 0,
      duration: 0.35,
      ease: 'power2.in',
      stagger: 0.05
    });

    gsap.timeline()
      .to(pageCurtain, {
        scaleX: 1,
        duration: 0.65,
        ease: 'power3.inOut',
        transformOrigin: 'left center',
        delay: 0.2
      })
      .call(() => { window.location.href = 'work.html'; });
  });

  /* ── SERVICE PREVIEW ── */
  const servicePreview = document.getElementById('servicePreview');
  const servicePreviewImg = document.getElementById('servicePreviewImg');

  const serviceImages = [
    { text: 'Website&Platform Design', src: 'https://picsum.photos/seed/s1/200/200' },
    { text: 'UIUX Design',             src: 'https://picsum.photos/seed/s2/200/200' },
    { text: 'Design System',           src: 'https://picsum.photos/seed/s3/200/200' },
    { text: 'Service Planning',        src: 'https://picsum.photos/seed/s4/200/200' },
    { text: 'Marketing',               src: 'https://picsum.photos/seed/s5/200/200' },
  ];

  gsap.set(servicePreview, { scale: 0.85 });

  document.querySelectorAll('.s2-row span').forEach(span => {
    const match = serviceImages.find(s => s.text === span.textContent.trim());

    span.addEventListener('mouseenter', () => {
      if (match) servicePreviewImg.src = match.src;
      gsap.to(servicePreview, { opacity: 1, scale: 1, duration: 0.35, ease: 'power2.out' });
    });

    span.addEventListener('mouseleave', () => {
      gsap.to(servicePreview, { opacity: 0, scale: 0.85, duration: 0.25, ease: 'power2.in' });
    });
  });

  document.addEventListener('mousemove', (e) => {
    gsap.to(servicePreview, {
      x: e.clientX,
      y: e.clientY,
      duration: 0.45,
      ease: 'power2.out',
      overwrite: 'auto'
    });
  });

  /* ── SECTION 2 SCROLL ANIMATION ── */
  gsap.timeline({
    scrollTrigger: {
      trigger: '.section2',
      start: 'top 80%',
      toggleActions: 'play none none none'
    }
  })
  .from('.s2-sub', {
    scale: 0.88,
    opacity: 0,
    duration: 0.85,
    ease: 'power3.out',
    transformOrigin: 'left center'
  })
  .from('.s2-title', {
    scale: 0.88,
    opacity: 0,
    duration: 0.95,
    ease: 'power3.out',
    transformOrigin: 'left center'
  }, '-=0.55')
  .from('.s2-row span', {
    scale: 0.88,
    opacity: 0,
    duration: 0.75,
    ease: 'power3.out',
    stagger: 0.1,
    transformOrigin: 'left center'
  }, '-=0.5');
</script>
</body>
</html>
